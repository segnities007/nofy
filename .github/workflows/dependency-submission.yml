# Submits Gradle dependency graph to GitHub for Dependabot alerts and dependency-review on PRs.
# Requires default-branch runs so pull requests have a baseline to diff against.
name: Dependency submission

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: dependency-submission-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  submit:
    name: Submit Gradle dependency graph
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4
