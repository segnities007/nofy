# Build release APK/AAB and attach as workflow artifacts (no Play upload).
# Trigger: version tags (v*) or manual run.
name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Assemble release
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release & bundle
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: nofy-release-apk-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Upload release AAB
        uses: actions/upload-artifact@v7
        with:
          name: nofy-release-aab-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90
          if-no-files-found: warn
